openapi: 3.1.0
info:
  title: Control Plane · Tenant Lifecycle API
  version: 1.3.0
  description: |
    控制平面（`services/control-plane`）对外的**租户注册 / 审批 / 开通状态 / 生命周期 / 配额查询**北向 REST 契约。

    控制平面是**跨租户单例**：自助注册 → 审批门控 → 命令式 provision（Keycloak Organizations + Helm SDK + 数据存储 + ESO）
    → 回写租户目录。设计见 `docs/architecture/05-多租户与控制平面.md` §2/§4 与 `docs/00-主仓初始化-spec.md` §2。

    **路径前缀约定（`/api` strip）**：本契约描述**网关暴露**的路径（`/v1/...`）。控制平面**实现**统一挂在
    部署级基路径 `/api` 下（即应用内 `/api/v1/...`），网关 APISIX 经 `proxy-rewrite` 去除 `/api` 前缀后转发。
    故 `/api` 为**部署细节**、不属对外契约，消费方一律对齐契约 `/v1/...`。

    **交付形态（delivery mode）为部署级、不入契约**：一个部署整体为公网 SaaS 或私有化（见架构 05 §1），
    非按租户选择；故注册体**不**含 `deliveryMode`，由控制平面据部署配置统一推导。

    **租户目录状态机**：`registered → approving → provisioning → active → suspended → deleted`
    （权威枚举见 `TenantStatus`）。状态迁移规则、以及控制平面**外呼开通边界**（Keycloak / Helm / 数据存储 / ESO，
    仅契约不含实现）见 [`contracts/icd/control-plane-provisioning-icd.md`](../icd/control-plane-provisioning-icd.md)。

    **鉴权与租户上下文**：经网关 APISIX 校验 JWT 后调用；平台运营管理员（admin 平面）可操作全部端点，
    租户自助注册为受限子集。控制平面信任网关注入的 `X-Tenant-*`（见 [`icd/tenant-context-headers`](../icd/tenant-context-headers-icd.md)），
    本契约不要求调用方自带租户头。

    🔴 红线：示例一律脱敏（`acme` / `tenant-demo` / `example.com`），不含任何真实信息。
  contact:
    name: hashmatrix platform
    url: https://github.com/HashMatrixData/hashmatrix
  x-contract:                       # 契约元数据（front-matter 等价物，见 CONVENTIONS §1）
    id: openapi/control-plane-v1
    owner: hashmatrix-control-plane
    status: draft
    producers: [hashmatrix-control-plane]
    consumers: [hashmatrix-webui]
servers:
  - url: https://api.example.com/control-plane     # 脱敏占位；实际经网关路由暴露
    description: 经网关暴露的控制平面 API（占位域名）
security:
  - bearerAuth: []
tags:
  - name: tenants
    description: 租户注册与租户目录
  - name: approval
    description: 审批门控
  - name: provisioning
    description: 开通状态
  - name: lifecycle
    description: 生命周期（停用 / 恢复 / 注销）
  - name: quota
    description: 配额查询
  - name: me
    description: 当前登录用户自助视图（跨租户 membership）
  - name: members
    description: 组织成员自管理（当前租户，按 X-Tenant-Id 寻址 · tenant-admin 门控）
paths:
  /v1/tenants:
    post:
      tags: [tenants]
      summary: 自助注册租户
      description: 创建一条租户目录记录，初始状态 `registered`，等待审批门控。`tenantId` 全局唯一。
      operationId: registerTenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantRegistration"
      responses:
        "201":
          description: 已注册（待审批）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: tenantId 已被占用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      tags: [tenants]
      summary: 列出租户目录
      description: 分页列出租户目录，可按状态过滤。运营管理员视图。
      operationId: listTenants
      parameters:
        - name: status
          in: query
          required: false
          description: 按租户状态过滤
          schema:
            $ref: "#/components/schemas/TenantStatus"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
      responses:
        "200":
          description: 租户目录分页
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantList"
  /v1/tenants/{tenantId}:
    parameters:
      - $ref: "#/components/parameters/TenantId"
    get:
      tags: [tenants]
      summary: 取租户目录条目
      description: 返回单个租户的目录数据模型（状态 / 配额 / 身份与数据平面接入信息）。
      operationId: getTenant
      responses:
        "200":
          description: 租户目录条目
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [lifecycle]
      summary: 注销租户
      description: |
        注销租户并异步 deprovision（回收 namespace / schema / org 等）。受理后置为 `deleted`（终态）。
        允许态：`provisioning`（放弃开通 / 回收半成品）/ `active` / `suspended`；其它态返回 `409`。
        deprovision 进度复用
        [`GET /v1/tenants/{tenantId}/provisioning`](#operation/getProvisioningStatus)（`phase` 表征回收进度）。
      operationId: deleteTenant
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "202":
          description: 已受理注销，异步 deprovision 进行中
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/StateConflict"
  /v1/tenants/{tenantId}/approval:
    parameters:
      - $ref: "#/components/parameters/TenantId"
    post:
      tags: [approval]
      summary: 审批裁决
      description: |
        对处于 `registered` / `approving` 的租户做审批裁决。
        `approve` → 置为 `provisioning` 并启动命令式开通；`reject` → 置为 `deleted`（关闭，带 `reason`）。
        **M1 实现注记**：开通当前为**同步**执行，`approve` 可能在同一响应内直接返回 `active`（而非过渡态 `provisioning`）；
        异步轮询语义（停在 `provisioning` + `GET /provisioning`）为后置。消费方勿把 `provisioning` 写死为 approve 的必经返回态。
      operationId: decideApproval
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalDecision"
      responses:
        "200":
          description: 裁决已记录，状态已迁移
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/StateConflict"
  /v1/tenants/{tenantId}/provisioning:
    parameters:
      - $ref: "#/components/parameters/TenantId"
    get:
      tags: [provisioning]
      summary: 查询开通状态
      description: |
        返回命令式开通（或注销 deprovision）的整体阶段与分步进度。分步 `target`
        对应控制平面外呼边界：`keycloak`（建 Organization）/ `helm`（per-tenant release）/
        `datastore`（schema·catalog）/ `secrets`（ESO 注入）。边界细节见 provisioning ICD。
      operationId: getProvisioningStatus
      responses:
        "200":
          description: 开通状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvisioningStatus"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/tenants/{tenantId}/suspend:
    parameters:
      - $ref: "#/components/parameters/TenantId"
    post:
      tags: [lifecycle]
      summary: 停用租户
      description: 冻结租户访问（保留数据与资源）。仅当状态为 `active` 时允许；`active → suspended`。
      operationId: suspendTenant
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: 已停用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/StateConflict"
  /v1/tenants/{tenantId}/resume:
    parameters:
      - $ref: "#/components/parameters/TenantId"
    post:
      tags: [lifecycle]
      summary: 恢复租户
      description: 解冻租户访问。仅当状态为 `suspended` 时允许；`suspended → active`。
      operationId: resumeTenant
      responses:
        "200":
          description: 已恢复
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/StateConflict"
  /v1/tenants/{tenantId}/quota:
    parameters:
      - $ref: "#/components/parameters/TenantId"
    get:
      tags: [quota]
      summary: 查询租户配额
      description: |
        返回租户的配额额度（`spec`）与当前用量（`usage`）。配额为硬限（K8s ResourceQuota +
        业务配额：用户数 / 数据量 / 作业数）；计量计费仅预留接口（合同制非按量）。
      operationId: getTenantQuota
      responses:
        "200":
          description: 配额额度与用量
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotaStatus"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/me/tenants:
    get:
      tags: [me]
      summary: 列出当前用户的租户 membership
      description: |
        返回**当前登录用户**（JWT 主体 `sub`）的租户成员资格列表，供 webui 渲染**租户切换器**。
        跨租户自助视图：由 control-plane 据已认证主体解析，**不要求**调用方携带 `X-Tenant-*`
        （用户可能尚未选定活动租户，或正要切换；对照 `icd/tenant-context-headers` §3.4）。
        响应恒为**数组**（D1：单 User + 多 Org Membership；M1 实现先返回 1 个，schema 一律按数组为多租户预留）；
        切换租户见 D2（以 `tenantKey` 重新换 token，`X-Tenant-Id` 始终唯一）。
      operationId: listMyTenants
      responses:
        "200":
          description: 当前用户的租户 membership 列表（可为空数组）
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MembershipView"
  /v1/org/members:
    get:
      tags: [members]
      summary: 列出当前租户组织成员
      description: |
        返回**当前活动租户**组织的成员列表。活动租户由网关注入的 `X-Tenant-Id` **唯一**确定
        （`require_tenant=true`）——本面为**租户自管理**（`apps/console` 内按角色门控），与 admin 跨租户运营
        （`/v1/tenants/{tenantId}/*`，SUPERADMIN 平面）**不同平面**；故按 header 寻址，**不**在 path 携带
        `tenantId`，避免与 `X-Tenant-Id` 双源（守 D2：`X-Tenant-Id` 唯一）。
        鉴权：调用方须具租户管理员角色 `tenant-admin`（非管理员 → `403`；不得跨租户读他租户成员）。
        🔴 成员真相（SoT）在 **Keycloak Organization**，control-plane 仅经 KC Admin API 编排读写，
        **PG 不另存成员凭据实体**（D1/R3）。
      operationId: listOrgMembers
      responses:
        "200":
          description: 当前租户组织成员列表（可为空数组）
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrgMemberView"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/StateConflict"
    post:
      tags: [members]
      summary: 邀请成员（加入已存在用户）
      description: |
        把一个**已存在**的 Keycloak 用户（按 email 或 username 精确定位）加入当前租户组织。
        M2 仅支持加入既有用户；完整邮件邀请新建（invite-by-email）后置，不在本版本。
        待加入用户在身份后端不存在 → `404`；已是成员则幂等成功。门控同 `listOrgMembers`（`tenant-admin`）。
      operationId: addOrgMember
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddOrgMemberRequest"
      responses:
        "201":
          description: 已加入组织，返回成员视图
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgMemberView"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: 待加入的用户在身份后端不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          $ref: "#/components/responses/StateConflict"
  /v1/org/members/{userId}:
    parameters:
      - $ref: "#/components/parameters/MemberUserId"
    delete:
      tags: [members]
      summary: 移除组织成员
      description: |
        将指定成员从当前租户组织移除。**幂等**：成员已不在组织中亦返回 `204`。
        门控同 `listOrgMembers`（`tenant-admin`，不得跨租户移除他租户成员）。成员从 Keycloak Org 解除，
        不删除其 Keycloak 用户账号本身（D1：单 User 多 Org Membership）。
      operationId: removeOrgMember
      responses:
        "204":
          description: 已移除（或成员本就不在组织中，幂等）
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/StateConflict"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Keycloak 颁发的 JWT，经网关 APISIX 校验；控制平面信任网关注入的身份与 X-Tenant-* 上下文。
  parameters:
    TenantId:
      name: tenantId
      in: path
      required: true
      description: 稳定租户标识（数据/计算隔离路由键）
      schema:
        type: string
        pattern: "^[a-z0-9][a-z0-9-]{1,38}[a-z0-9]$"
        example: tenant-demo
    MemberUserId:
      name: userId
      in: path
      required: true
      description: 组织成员的 Keycloak user id（= `OrgMemberView.userId`）
      schema:
        type: string
        example: 5f3a1c00-0000-4000-8000-0000000000aa
  responses:
    BadRequest:
      description: 请求不合法
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: 租户不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    StateConflict:
      description: 与当前状态机不允许的迁移冲突（成员面：租户组织尚未开通，`keycloak_org_id` 为空）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: 已认证但无权限（成员面：缺租户管理员角色 `tenant-admin`，或试图跨租户操作他租户成员）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    TenantStatus:
      type: string
      description: 租户目录状态机（迁移规则见 provisioning ICD）。
      enum: [registered, approving, provisioning, active, suspended, deleted]
      example: active
    TenantRegistration:
      type: object
      required: [tenantId, displayName, adminEmail]
      properties:
        tenantId:
          type: string
          description: 申请的稳定租户标识（隔离路由键）；全局唯一。
          pattern: "^[a-z0-9][a-z0-9-]{1,38}[a-z0-9]$"
          example: tenant-demo
        displayName:
          type: string
          description: 租户显示名
          example: Demo Tenant
        adminEmail:
          type: string
          format: email
          description: 租户管理员邮箱（开通后用于初始化 Keycloak 管理员）
          example: admin@example.com
        requestedQuota:
          $ref: "#/components/schemas/QuotaSpec"
    Tenant:
      type: object
      description: 租户目录条目（控制平面回写的状态 / 配额 / 接入信息）。
      required: [tenantId, displayName, status, createdAt]
      properties:
        tenantId:
          type: string
          example: tenant-demo
        displayName:
          type: string
          example: Demo Tenant
        status:
          $ref: "#/components/schemas/TenantStatus"
        organization:
          $ref: "#/components/schemas/OrganizationRef"
        dataPlane:
          $ref: "#/components/schemas/DataPlaneRef"
        quota:
          $ref: "#/components/schemas/QuotaSpec"
        statusReason:
          type: string
          description: |
            最近一次状态流转的原因 / 失败详情（审计与排障；如开通失败步骤、挂起原因、驳回理由）。
            可选——未发生有意义流转时可不返回；消费方 tolerant reader。
          example: 开通完成
        createdAt:
          type: string
          format: date-time
          example: "2026-06-18T08:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-06-18T08:05:00Z"
    TenantList:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Tenant"
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 20
        total:
          type: integer
          example: 1
    MembershipView:
      type: object
      description: |
        当前登录用户在某租户的**成员资格视图**（D1：单 User + 多 Org Membership + 每租户角色）。
        由 control-plane 据 JWT 主体（`sub`）跨租户解析，供 webui 渲染租户切换器；
        切换到该租户走 D2（以 `tenantKey` 向 Keycloak 重新换取 org-scoped token，`X-Tenant-Id` 始终唯一）。
      required: [tenantId, tenantKey, displayName, status]
      properties:
        tenantId:
          type: string
          description: 稳定租户标识（与 `Tenant.tenantId` / `X-Tenant-Id` 路由键同源；数据·计算隔离的权威键）。
          example: tenant-demo
        tenantKey:
          type: string
          description: |
            Keycloak Organization 别名键（= `OrganizationRef.orgAlias`）；切换租户时用于申请该 org 的 org-scoped token。
            部署内稳定；demo 下与 `tenantId` 取值相同，生产可不同（`tenantId` 映射 org UUID 时）。
          example: tenant-demo
        displayName:
          type: string
          description: 租户显示名（与 `Tenant.displayName` 一致）。
          example: Demo Tenant
        status:
          $ref: "#/components/schemas/TenantStatus"
        roles:
          type: array
          description: |
            当前用户在该租户的角色（D1「每租户角色」）。可选——M1 实现可暂不返回；
            消费方 tolerant reader，未返回时不得报错。
          items:
            type: string
          example: [tenant-admin]
    OrgMemberView:
      type: object
      description: |
        当前租户组织的**成员只读视图**（区别于跨租户的 `MembershipView`：后者是「我属于哪些租户」的切换器，
        本视图是「某租户里有哪些成员」的自管理列表）。
        🔴 仅含身份标识与启用态，**绝不**承载任何凭据（密码/哈希/credential）——成员 SoT 在 Keycloak。
      required: [userId, username, enabled]
      properties:
        userId:
          type: string
          description: Keycloak user id（成员稳定键，`DELETE /v1/org/members/{userId}` 寻址用）。
          example: 5f3a1c00-0000-4000-8000-0000000000aa
        username:
          type: string
          description: 登录名
          example: member-demo
        email:
          type: string
          format: email
          description: 邮箱（可空——Keycloak user 不强制有 email）；消费方 tolerant reader。
          example: member@example.com
        enabled:
          type: boolean
          description: 账号是否启用
          example: true
    AddOrgMemberRequest:
      type: object
      description: 邀请成员请求体——把一个**已存在**的用户加入当前租户组织。
      required: [emailOrUsername]
      properties:
        emailOrUsername:
          type: string
          description: 待加入成员的 email 或 username（须为身份后端中**已存在**的用户）。
          example: member@example.com
    OrganizationRef:
      type: object
      description: Keycloak Organization 引用（开通时建立；身份隔离 = 单 realm，org = 租户）。
      properties:
        orgId:
          type: string
          description: Keycloak Organization 唯一 id
          example: 5f3a1c00-0000-4000-8000-000000000001
        orgAlias:
          type: string
          description: Organization 别名（部署内稳定）
          example: tenant-demo
    DataPlaneRef:
      type: object
      description: 数据平面接入信息（开通后回写；租户 `deleted` 后资源已回收，此处仅作历史快照，不可再路由）。
      properties:
        namespace:
          type: string
          description: 该租户的 K8s 命名空间
          example: tenant-demo
        dbSchema:
          type: string
          description: 平台业务库（PG）schema/db 名
          example: tenant_demo
        dorisCatalog:
          type: string
          description: 数据仓 Doris catalog（湖 Paimon database 同理）
          example: tenant_demo
        helmRelease:
          type: string
          description: per-tenant Helm release 名
          example: tenant-demo
    ApprovalDecision:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [approve, reject]
          example: approve
        reason:
          type: string
          description: 裁决理由；`reject` 时必填（驳回置租户为 `deleted` 不可逆，须留审计）。
          example: ok
      if:
        properties:
          decision:
            const: reject
      then:
        required: [reason]
    ProvisioningStatus:
      type: object
      description: 命令式开通 / 注销 deprovision 的整体阶段与分步进度。
      required: [tenantId, phase, steps]
      properties:
        tenantId:
          type: string
          example: tenant-demo
        phase:
          $ref: "#/components/schemas/ProvisioningPhase"
        startedAt:
          type: string
          format: date-time
          example: "2026-06-18T08:01:00Z"
        finishedAt:
          type: string
          format: date-time
          example: "2026-06-18T08:05:00Z"
        steps:
          type: array
          items:
            $ref: "#/components/schemas/ProvisioningStep"
    ProvisioningPhase:
      type: string
      description: 开通整体阶段。`failed` 时租户停在 `provisioning`，可重试，不进 `active`。
      enum: [pending, in_progress, succeeded, failed]
      example: succeeded
    ProvisioningStep:
      type: object
      description: 单个外呼开通步骤（target 对应控制平面外呼边界，见 provisioning ICD）。
      required: [target, status]
      properties:
        target:
          type: string
          description: 外呼目标
          enum: [keycloak, helm, datastore, secrets]
          example: helm
        status:
          type: string
          enum: [pending, in_progress, succeeded, failed, skipped]
          example: succeeded
        message:
          type: string
          example: per-tenant release applied
        updatedAt:
          type: string
          format: date-time
          example: "2026-06-18T08:03:00Z"
    QuotaSpec:
      type: object
      description: 配额额度（硬限）。compute 对应 K8s ResourceQuota，其余为业务配额。
      properties:
        maxUsers:
          type: integer
          description: 用户数硬限
          example: 50
        maxStorageGi:
          type: integer
          description: 数据量硬限（GiB）
          example: 500
        maxConcurrentJobs:
          type: integer
          description: 并发作业数硬限
          example: 10
        compute:
          $ref: "#/components/schemas/ComputeQuota"
    ComputeQuota:
      type: object
      properties:
        cpuCores:
          type: integer
          example: 16
        memoryGi:
          type: integer
          example: 64
    QuotaStatus:
      type: object
      required: [tenantId, spec, usage]
      properties:
        tenantId:
          type: string
          example: tenant-demo
        spec:
          $ref: "#/components/schemas/QuotaSpec"
        usage:
          $ref: "#/components/schemas/QuotaUsage"
    QuotaUsage:
      type: object
      description: 当前用量快照（计量计费仅预留，不按量计费）。
      properties:
        users:
          type: integer
          example: 12
        storageGi:
          type: integer
          example: 120
        runningJobs:
          type: integer
          example: 2
        compute:
          $ref: "#/components/schemas/ComputeQuota"
    ReasonRequest:
      type: object
      properties:
        reason:
          type: string
          example: scheduled maintenance
    Error:
      type: object
      description: 统一错误信封（后续可抽取为平台级 error-envelope ICD）。
      required: [code, message]
      properties:
        code:
          type: string
          description: 机器可读错误码
          example: TENANT_NOT_FOUND
        message:
          type: string
          example: tenant not found
        traceId:
          type: string
          description: 链路追踪 id（便于排障）
          example: "00000000000000000000000000000001"
