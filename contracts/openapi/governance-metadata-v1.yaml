openapi: 3.1.0
info:
  title: Governance · Metadata Supply API
  version: 1.0.0
  description: |
    数据治理（`services/governance`）作为平台**元数据供数中枢**对外的**同步供数 REST 契约**：
    元数据检索 / 资产详情 / 血缘 / 权限要素与状态 / 开放查询。被资产门户、
    安全中心（`security`）、数据服务等多个子系统消费。本契约由 ICD 草案
    [`icd/governance-metadata`](../icd/governance-metadata-icd.md) §2 细化而来；异步变更事件见
    [`asyncapi/governance-metadata.yaml`](../asyncapi/governance-metadata.yaml)。

    **边界（DG3/DG4）**：元数据只出索引 + API，消费方不直连 governance 内部库；`/api/perm/*`
    仅做**权限要素与状态透传，不裁决**（分类分级策略与审批归 `security`）。

    **租户隔离**：所有接口均**租户感知**——租户上下文由网关注入 `X-Tenant-*`
    （见 [`icd/tenant-context-headers`](../icd/tenant-context-headers-icd.md)），结果按租户隔离，跨租户默认不可见；
    本契约不要求调用方自带租户头。字段级敏感信息按 `security` 分类分级标签裁剪后再出。

    🔴 红线：示例一律脱敏（`acme` / `tenant-demo` / `example.com`），不含任何真实信息。
  contact:
    name: hashmatrix platform
    url: https://github.com/HashMatrixData/hashmatrix
  x-contract:
    id: openapi/governance-metadata-v1
    owner: hashmatrix-governance
    status: draft
    producers: [hashmatrix-governance]
    consumers: [hashmatrix-security, hashmatrix-webui, hashmatrix-data-foundation, hashmatrix-platform-common]
servers:
  - url: https://api.example.com/governance        # 脱敏占位；实际经网关路由暴露
    description: 经网关暴露的治理供数 API（占位域名）
security:
  - bearerAuth: []
tags:
  - name: metadata
    description: 元数据检索与详情
  - name: lineage
    description: 血缘 / 影响分析
  - name: permission
    description: 权限要素与状态（透传不裁决）
  - name: open-query
    description: 开放查询（统一供数）
paths:
  /api/meta/search:
    get:
      tags: [metadata]
      summary: 元数据检索 / 分面
      description: 关键字 + 类型分面检索资产元数据，分页返回；结果按租户隔离。
      operationId: searchMetadata
      parameters:
        - name: q
          in: query
          required: false
          description: 检索关键字
          schema:
            type: string
            example: orders
        - name: type
          in: query
          required: false
          description: 资产类型过滤
          schema:
            $ref: "#/components/schemas/AssetType"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
      responses:
        "200":
          description: 检索结果（含分面）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetaSearchResult"
  /api/meta/detail/{id}:
    parameters:
      - $ref: "#/components/parameters/AssetId"
    get:
      tags: [metadata]
      summary: 资产详情聚合（含字段、归属、标签）
      description: 返回单个资产的聚合详情（字段、归属、标签、分类分级透传）。
      operationId: getAssetDetail
      responses:
        "200":
          description: 资产详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetDetail"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/meta/lineage/{id}:
    parameters:
      - $ref: "#/components/parameters/AssetId"
    get:
      tags: [lineage]
      summary: 血缘 / 影响分析（表级 / 字段级）
      description: 返回资产的血缘图（上/下游、表级或字段级），用于影响分析。
      operationId: getLineage
      parameters:
        - name: direction
          in: query
          required: false
          schema:
            type: string
            enum: [upstream, downstream, both]
            default: both
        - name: level
          in: query
          required: false
          schema:
            type: string
            enum: [table, column]
            default: table
        - name: depth
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 10
            default: 3
      responses:
        "200":
          description: 血缘图
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lineage"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/perm/elements/{id}:
    parameters:
      - $ref: "#/components/parameters/AssetId"
    get:
      tags: [permission]
      summary: 权限要素（供安全中心判定，透传不裁决）
      description: 返回资产的权限要素集合（供 security 判定）；本接口仅透传，不做裁决（DG4）。
      operationId: getPermissionElements
      responses:
        "200":
          description: 权限要素集合
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionElements"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/perm/status:
    get:
      tags: [permission]
      summary: 权限状态查询
      description: 查询某资产（可选指定主体）的权限状态；按租户隔离。
      operationId: getPermissionStatus
      parameters:
        - name: assetId
          in: query
          required: true
          schema:
            type: string
            example: asset-1001
        - name: subjectId
          in: query
          required: false
          description: 主体（用户 / 服务账号）
          schema:
            type: string
            example: 11111111-1111-4111-8111-111111111111
      responses:
        "200":
          description: 权限状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionStatus"
  /api/open/query:
    post:
      tags: [open-query]
      summary: 开放查询（统一供数）
      description: 统一供数查询入口，按数据集 + 过滤条件取数；字段级敏感信息按分类分级裁剪后返回。
      operationId: openQuery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenQueryRequest"
      responses:
        "200":
          description: 查询结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenQueryResult"
        "400":
          $ref: "#/components/responses/BadRequest"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 服务账号 JWT，经网关 APISIX 校验；治理服务信任网关注入的 X-Tenant-* 租户上下文。
  parameters:
    AssetId:
      name: id
      in: path
      required: true
      description: 资产标识
      schema:
        type: string
        example: asset-1001
  responses:
    BadRequest:
      description: 请求不合法
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: 资产不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    AssetType:
      type: string
      enum: [table, view, column, dataset, api]
      example: table
    AssetSummary:
      type: object
      required: [id, name, type]
      properties:
        id:
          type: string
          example: asset-1001
        name:
          type: string
          example: orders
        type:
          $ref: "#/components/schemas/AssetType"
        owner:
          type: string
          description: 归属（团队 / 责任人占位）
          example: data-team
        tags:
          type: array
          items:
            type: string
          example: [finance]
    MetaSearchResult:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AssetSummary"
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 20
        total:
          type: integer
          example: 1
        facets:
          type: array
          description: 分面聚合（如按类型 / 标签）
          items:
            $ref: "#/components/schemas/Facet"
    Facet:
      type: object
      required: [field, buckets]
      properties:
        field:
          type: string
          example: type
        buckets:
          type: array
          items:
            $ref: "#/components/schemas/FacetBucket"
    FacetBucket:
      type: object
      required: [value, count]
      properties:
        value:
          type: string
          example: table
        count:
          type: integer
          example: 1
    AssetDetail:
      type: object
      required: [id, name, type]
      properties:
        id:
          type: string
          example: asset-1001
        name:
          type: string
          example: orders
        type:
          $ref: "#/components/schemas/AssetType"
        owner:
          type: string
          example: data-team
        tags:
          type: array
          items:
            type: string
          example: [finance]
        fields:
          type: array
          items:
            $ref: "#/components/schemas/FieldMeta"
    FieldMeta:
      type: object
      required: [name, dataType]
      properties:
        name:
          type: string
          example: customer_email
        dataType:
          type: string
          example: varchar
        classification:
          type: string
          description: 分类分级标签（由 security 裁定，本接口透传）
          example: PII
    Lineage:
      type: object
      required: [assetId, nodes, edges]
      properties:
        assetId:
          type: string
          example: asset-1001
        level:
          type: string
          enum: [table, column]
          example: table
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/LineageNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/LineageEdge"
    LineageNode:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          example: asset-1001
        name:
          type: string
          example: orders
        type:
          $ref: "#/components/schemas/AssetType"
    LineageEdge:
      type: object
      required: [from, to]
      properties:
        from:
          type: string
          example: asset-1000
        to:
          type: string
          example: asset-1001
        relation:
          type: string
          example: derives
    PermissionElements:
      type: object
      description: 权限要素透传（不裁决；security 据此判定）。
      required: [assetId, elements]
      properties:
        assetId:
          type: string
          example: asset-1001
        elements:
          type: array
          items:
            $ref: "#/components/schemas/PermissionElement"
    PermissionElement:
      type: object
      required: [key, value]
      properties:
        key:
          type: string
          example: classification
        value:
          type: string
          example: PII
    PermissionStatus:
      type: object
      required: [assetId, status]
      properties:
        assetId:
          type: string
          example: asset-1001
        subjectId:
          type: string
          example: 11111111-1111-4111-8111-111111111111
        status:
          type: string
          enum: [granted, denied, pending, unknown]
          example: granted
    OpenQueryRequest:
      type: object
      required: [dataset]
      properties:
        dataset:
          type: string
          description: 目标数据集 / 资产标识
          example: asset-1001
        fields:
          type: array
          items:
            type: string
          example: [order_id, amount]
        filters:
          type: array
          items:
            $ref: "#/components/schemas/QueryFilter"
        limit:
          type: integer
          minimum: 1
          maximum: 10000
          default: 100
          example: 100
    QueryFilter:
      type: object
      required: [field, op, value]
      properties:
        field:
          type: string
          example: amount
        op:
          type: string
          enum: [eq, ne, gt, ge, lt, le, in, like]
          example: gt
        value:
          type: string
          example: "100"
    OpenQueryResult:
      type: object
      required: [columns, rows]
      properties:
        columns:
          type: array
          items:
            type: string
          example: [order_id, amount]
        rows:
          type: array
          description: 行数据（每行与 columns 对齐）
          items:
            type: array
            items:
              type: string
          example: [["order-1", "120"]]
        total:
          type: integer
          example: 1
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: ASSET_NOT_FOUND
        message:
          type: string
          example: asset not found
        traceId:
          type: string
          example: "00000000000000000000000000000001"
