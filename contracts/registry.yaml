# 契约登记表 —— 机器可读单一索引（CONVENTIONS.md §文档格式）。
# 新增/变更契约务必在此登记；子项目的 producer/consumer 映射由本表反推（见 integration.md）。
version: 1
contracts:
  - id: icd/tenant-context-headers
    type: icd
    path: icd/tenant-context-headers-icd.md
    status: draft
    version: 1.2.0          # +§3.6 管理平面 require_tenant=false 留痕（MINOR 加法），与契约文件 front-matter 对齐
    producers: [hashmatrix-gateway]
    consumers:
      - hashmatrix-governance
      - hashmatrix-security
      - hashmatrix-privacy
      - hashmatrix-data-foundation
      - hashmatrix-platform-common
      - hashmatrix-control-plane

  - id: icd/governance-metadata
    type: icd
    path: icd/governance-metadata-icd.md
    status: draft          # 消费方待对齐（ICD §5）
    version: 0.2.0          # +§2 写入面（资产登记/编辑）轮廓与租户语义（MINOR 加法，#56）
    producers: [hashmatrix-governance]
    consumers:
      - hashmatrix-security
      - hashmatrix-webui
      - hashmatrix-data-foundation
      - hashmatrix-platform-common

  - id: openapi/privacy-orchestrator-v1
    type: openapi
    path: openapi/privacy-orchestrator-v1.yaml
    status: draft          # 编排层对外 REST（客户端/网关 → orchestrator-java），经网关 /api/privacy/* 暴露
    version: 1.0.0
    producers: [hashmatrix-privacy]
    consumers:
      - hashmatrix-webui

  - id: openapi/privacy-psi-v1
    type: openapi
    path: openapi/privacy-psi-v1.yaml
    status: draft          # Java 编排层 ↔ Python 计算引擎 PSI 编排（privacy 内部线契约）
    version: 1.0.0
    producers: [hashmatrix-privacy]
    consumers: [hashmatrix-privacy]

  - id: proto/privacy-psi
    type: proto
    path: proto/privacy/v1/psi.proto
    status: draft          # 前瞻：gRPC 流式 PSI 演进目标，待 protoc 工具链
    version: 1.0.0
    producers: [hashmatrix-privacy]
    consumers: [hashmatrix-privacy]

  - id: openapi/control-plane-v1
    type: openapi
    path: openapi/control-plane-v1.yaml
    status: draft          # 控制平面北向：租户注册/审批/开通状态/生命周期/配额查询 + 当前用户 membership（/me/tenants）+ 组织成员自管理（/v1/org/members）
    version: 1.3.0          # +组织成员管理面 /v1/org/members（list/add/remove，加法 MINOR；#57）
    producers: [hashmatrix-control-plane]
    consumers: [hashmatrix-webui]

  - id: icd/control-plane-provisioning
    type: icd
    path: icd/control-plane-provisioning-icd.md
    status: draft          # 租户目录状态机 + 外呼开通边界（Keycloak/Helm/datastore/ESO，仅契约）
    version: 1.0.0
    producers: [hashmatrix-control-plane]
    consumers: [hashmatrix-webui]

  - id: openapi/governance-metadata-v1
    type: openapi
    path: openapi/governance-metadata-v1.yaml
    status: draft          # governance 同步供数 REST（icd/governance-metadata §2 细化）
    version: 1.1.0          # +资产登记/编辑写入面 POST /api/meta/assets · PUT /{id}（MINOR 加法，#56）
    producers: [hashmatrix-governance]
    consumers:
      - hashmatrix-security
      - hashmatrix-webui
      - hashmatrix-data-foundation
      - hashmatrix-platform-common

  - id: asyncapi/governance-metadata
    type: asyncapi
    path: asyncapi/governance-metadata.yaml
    status: draft          # governance 异步元数据变更事件（icd/governance-metadata §3 细化）
    version: 1.0.0
    producers: [hashmatrix-governance]
    consumers:
      - hashmatrix-security
      - hashmatrix-data-foundation
      - hashmatrix-platform-common

  - id: openapi/governance-metamodel
    type: openapi
    path: openapi/governance-metamodel.yaml
    status: draft          # 元模型管理写侧（webui 元模型设计器 ↔ governance），待 webui 评审对齐
    version: 0.1.0
    producers: [hashmatrix-governance]
    consumers:
      - hashmatrix-webui

  - id: openapi/data-foundation-datasources-v1
    type: openapi
    path: openapi/data-foundation-datasources-v1.yaml
    status: draft          # M2 数据源接入链①（锚点）：登记/测试连接/列表/库表/预览；据子仓实现回填（#55）
    version: 0.1.0
    producers: [hashmatrix-data-foundation]
    consumers:
      - hashmatrix-gateway
      - hashmatrix-webui

  - id: icd/data-foundation-datasources
    type: icd
    path: icd/data-foundation-datasources-icd.md
    status: draft          # 数据源接入伴随 ICD：信封/租户隔离(D9)/凭据红线(D7)/连接器中立(D8)/防注入（#55）
    version: 0.1.0
    producers: [hashmatrix-data-foundation]
    consumers:
      - hashmatrix-gateway
      - hashmatrix-webui
