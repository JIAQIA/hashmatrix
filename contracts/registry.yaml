# 契约登记表 —— 机器可读单一索引（CONVENTIONS.md §文档格式）。
# 新增/变更契约务必在此登记；子项目的 producer/consumer 映射由本表反推（见 integration.md）。
version: 1
contracts:
  - id: icd/tenant-context-headers
    type: icd
    path: icd/tenant-context-headers-icd.md
    status: draft
    version: 1.0.0
    producers: [hashmatrix-gateway]
    consumers:
      - hashmatrix-governance
      - hashmatrix-security
      - hashmatrix-tools-bi
      - hashmatrix-privacy
      - hashmatrix-data-foundation
      - hashmatrix-platform-common
      - hashmatrix-control-plane

  - id: icd/governance-metadata
    type: icd
    path: icd/governance-metadata-icd.md
    status: draft          # 消费方待对齐（ICD §5）
    version: 0.1.0
    producers: [hashmatrix-governance]
    consumers:
      - hashmatrix-tools-bi
      - hashmatrix-security
      - hashmatrix-webui
      - hashmatrix-data-foundation
      - hashmatrix-platform-common

  - id: openapi/privacy-psi-v1
    type: openapi
    path: openapi/privacy-psi-v1.yaml
    status: draft          # Java 编排层 ↔ Python 计算引擎 PSI 编排（privacy 内部线契约）
    version: 1.0.0
    producers: [hashmatrix-privacy]
    consumers: [hashmatrix-privacy]

  - id: proto/privacy-psi
    type: proto
    path: proto/privacy/v1/psi.proto
    status: draft          # 前瞻：gRPC 流式 PSI 演进目标，待 protoc 工具链
    version: 1.0.0
    producers: [hashmatrix-privacy]
    consumers: [hashmatrix-privacy]

  - id: openapi/control-plane-v1
    type: openapi
    path: openapi/control-plane-v1.yaml
    status: draft          # 控制平面北向：租户注册/审批/开通状态/生命周期/配额查询
    version: 1.0.0
    producers: [hashmatrix-control-plane]
    consumers: [hashmatrix-webui]

  - id: icd/control-plane-provisioning
    type: icd
    path: icd/control-plane-provisioning-icd.md
    status: draft          # 租户目录状态机 + 外呼开通边界（Keycloak/Helm/datastore/ESO，仅契约）
    version: 1.0.0
    producers: [hashmatrix-control-plane]
    consumers: [hashmatrix-webui]

  - id: openapi/governance-metadata-v1
    type: openapi
    path: openapi/governance-metadata-v1.yaml
    status: draft          # governance 同步供数 REST（icd/governance-metadata §2 细化）
    version: 1.0.0
    producers: [hashmatrix-governance]
    consumers:
      - hashmatrix-tools-bi
      - hashmatrix-security
      - hashmatrix-webui
      - hashmatrix-data-foundation
      - hashmatrix-platform-common

  - id: asyncapi/governance-metadata
    type: asyncapi
    path: asyncapi/governance-metadata.yaml
    status: draft          # governance 异步元数据变更事件（icd/governance-metadata §3 细化）
    version: 1.0.0
    producers: [hashmatrix-governance]
    consumers:
      - hashmatrix-tools-bi
      - hashmatrix-security
      - hashmatrix-data-foundation
      - hashmatrix-platform-common
