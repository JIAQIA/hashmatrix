# ── 本地/dev 端到端验证环境覆盖（分层第三层 · 仅本地 kind 单 ns）。 ──
# 目标：单 ns 真实贯通 浏览器 → gateway(OIDC + 注入 X-Tenant-*) → **真实 governance** → PG。
#   启用 in-cluster Keycloak（真实 OIDC 身份源）+ PostgreSQL + gateway + 真实 governance 子 chart。
# 一键部署（charts 资源限额见主仓 #33，6–8G dev 机可起 keycloak+governance 双 JVM）：
#   helm dependency build deploy/charts/platform
#   helm upgrade --install platform deploy/charts/platform -n demo --create-namespace \
#     -f deploy/values/values.yaml -f deploy/values/values-localdev.yaml
# 🔴 红线：本环境含 dev 占位凭据/脱敏 demo 用户，**严禁用于任何非本地环境**。
global:
  env: localdev

baseNamespaces:
  podSecurity: baseline   # 本地放宽到 baseline，便于联调

# dev 基础设施子 chart：in-cluster Keycloak + PostgreSQL（见 charts/infra-dev/README）。
# PG 随 infra-dev 默认起（postgres.enabled 默认 true）：固定 Service postgres:5432，各服务独立 db 由 initdb 幂等建。
# echoStub 关闭：A3 网关已直连真实 governance，不再需要 go-httpbin 回显桩。
# （若要回到 A2 用 cluster_e2e B 档断言 X-Tenant 注入回显，临时置 echoStub.enabled=true 并把下方
#  gateway.upstreams.governance 改回 host=upstream-echo/port=8080。）
infra-dev:
  enabled: true
  echoStub:
    enabled: false

# gateway（#17 已落地）：discovery 默认指向 in-cluster keycloak:8080（与 infra-dev 固定 Service 名对齐）。
# A3：受保护路由上游 = 真实 governance:8082（gateway chart 默认值），不再指回显桩。
# webui 公共路由按 Host 分流（本地经 /etc/hosts 把 console.localdev/admin.localdev 指向 127.0.0.1，
# 或 curl -H "Host: console.localdev"）。上游 host/port 由 gateway chart 默认提供，此处仅定 Host。
gateway:
  enabled: true
  webui:
    hosts:
      console: console.localdev
      admin: admin.localdev

# governance（#15 · I5/A3）：真实子 chart 进集群，datasource 指 infra-dev 的 in-cluster PG。
# 镜像与 datasource(host=postgres/user=hashmatrix/db=governance) 由子 chart values 默认提供；此处仅开开关。
# 资源限额/JVM 堆上限随子 chart 默认（#33），keycloak+governance 双 JVM 在 6G dev 机受 limit 约束可稳跑。
governance:
  enabled: true

# security（#38 · I5）：真实子 chart 进集群，datasource 指 infra-dev in-cluster PG（独立 db `security`，
# Flowable 启动期自建 ACT_*）。镜像与 datasource 由子 chart values 默认提供；此处仅开开关。
# ⚠️ 第三个 JVM（keycloak + governance + security）：子 chart 默认 memory limit（512Mi）是 OOM 护栏，
#    6–8G dev 机受 limit 约束可起；更紧张时按需关闭本开关或下调资源（#32/#33）。
# 经网关可达由 gateway chart 的 security-upstream + 受保护路由 /api/security/* 承载（I2）。
security:
  enabled: true

# ── M1·I5/I3：control-plane / data-foundation / platform-common / webui 真实子 chart 进集群 ──
# ⚠️ 多 JVM 叠加（keycloak + governance + security + 本三后端 = 6 个 JVM）：6–8G dev 机靠下方
#    **小本地启动资源**（收紧 request/limit + 降 MaxRAMPercentage）兜 OOM；更紧张时按需关闭某开关（#32/#33）。
# 经网关可达由 gateway chart 对应 upstream + 受保护路由承载（control-plane /api/v1/*、
# data-foundation /api/connectors/*、platform-common /api/platform/*；webui 按 Host 分流 /*）。

# control-plane（控制平面）：datasource 指 in-cluster PG（独立 db `controlplane`，Flyway 管 schema）；
# 身份开通默认 stub（keycloak.enabled=false），M1 不阻塞；切真实 Keycloak 见子 chart README。
control-plane:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 384Mi
  jvmOpts: "-XX:MaxRAMPercentage=70.0"

# data-foundation（数据底座）：M1 无持久 datasource（连接器目录骨架）。
data-foundation:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 384Mi
  jvmOpts: "-XX:MaxRAMPercentage=70.0"

# platform-common（平台公共服务）：datasource 指 in-cluster PG（独立 db `platformcommon`，纯 JDBC）。
platform-common:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 384Mi
  jvmOpts: "-XX:MaxRAMPercentage=70.0"

# webui（前端）：console + admin 双 nginx 静态 SPA（轻量，非 JVM，用子 chart 小资源默认）。
# OIDC authority 指向**浏览器可达**的 dev Keycloak（宿主暴露 8180；勿用集群内 keycloak:8080——浏览器够不到）。
# 🔴 红线：脱敏占位（*.localdev / localhost）；真实域名/realm 部署级注入。
webui:
  enabled: true
  branding:
    appName: "HashMatrix"
    companyName: "Acme Demo Tech"
  console:
    config:
      apiBaseUrl: "/api"
      oidcAuthority: "http://localhost:8180/realms/hashmatrix"
      oidcClientId: "hashmatrix-webui"
  admin:
    # admin 运营面镜像后置（post-M1，见 webui#3 / PR #23 仅出 console 镜像）：暂关运营面，
    # 不影响 console 纵切链（M1 DoD = browser→gateway→governance→PG→console 渲染）。admin 镜像出包后置 true 恢复。
    enabled: false
    config:
      apiBaseUrl: "/api"
      oidcAuthority: "http://localhost:8180/realms/hashmatrix"
      oidcClientId: "hashmatrix-admin"
