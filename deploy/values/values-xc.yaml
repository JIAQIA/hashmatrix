# ─────────────────────────────────────────────────────────────────────────────
# 信创（xc = 信息技术应用创新）环境覆盖。
# 信创双轨原则：仅切「镜像 / 参数 / 资源」，**不改应用逻辑**（架构 04 §3）。
# 与 prod/test 同结构，差异集中在镜像仓与基础设施选型。
# ─────────────────────────────────────────────────────────────────────────────
global:
  env: xc
  # 国产化/私有镜像仓（鲲鹏/飞腾 + 麒麟/统信）。
  # imageRegistry: registry.internal/hashmatrix-xc

baseNamespaces:
  podSecurity: restricted

# 信创差异示例（落地填实，均为「换 values 不改逻辑」）：
#  · 镜像：切多架构（arm64 鲲鹏/飞腾）镜像 tag
#  · 数据源：达梦/金仓作为数据源经 Connector 插件接入（不改主干代码）
#  · 有状态依赖：按信创清单替换/钉版本
# gateway:
#   enabled: true
