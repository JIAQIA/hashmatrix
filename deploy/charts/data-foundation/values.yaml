# data-foundation 子 chart values —— M1 真实部署（数据底座分系统）。
# 🔴 红线：仅 dev 占位凭据 / 脱敏 demo（acme / tenant-demo / example.com）；严禁任何真实甲方参数。
# D5：子仓交付 image，主仓 owns chart；镜像部署级注入、tag 固定（勿 latest）。
# umbrella 经 `data-foundation.enabled` 渲染（默认关，仅 values-localdev 开）。
# 注意：M1 app 模块无持久 datasource（连接器目录骨架）→ 本子 chart 不注入 PG env。

# umbrella 注入的全局项（standalone 渲染时为空 dict）；imageRegistry 供信创 xc 切私有/国产化镜像仓。
global:
  imageRegistry: ""

# umbrella 条件开关（对应 platform/Chart.yaml dependencies 的 condition: data-foundation.enabled）。
enabled: false

image:
  repository: ghcr.io/hashmatrixdata/data-foundation
  tag: "0.1.0-SNAPSHOT"       # 移动 dev tag（对齐子仓 CI：image tag=project.version=0.1.0-SNAPSHOT，与 governance 同款）
  pullPolicy: IfNotPresent

replicas: 1
# 资源限额（dev 保守默认；prod 经 values-<env> 上调）。memory limit 是 OOM 护栏（多 JVM 叠加，#32）。
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi
# JVM 堆随**容器 limit**自适配（MaxRAMPercentage 作用于 cgroup limit）。注入为 JAVA_TOOL_OPTIONS。
jvmOpts: "-XX:MaxRAMPercentage=75.0"

service:
  type: ClusterIP
  port: 8084                  # 应用 HTTP（端口基线）；gateway upstream host=data-foundation:8084 依赖此名/口
managementPort: 9084          # actuator（探针/指标），独立于应用端口（端口基线 §3）
