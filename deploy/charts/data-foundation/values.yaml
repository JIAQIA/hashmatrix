# data-foundation 子 chart values（占位）。
# 落地时由 services/data-foundation 贡献真实模板，并接入 umbrella 的分环境 values（prod/test/xc）。

# umbrella 通过 `data-foundation.enabled` 条件决定是否渲染本子 chart（默认关闭，占位阶段不产出清单）。
enabled: false

# 镜像（占位，部署级注入）。
image:
  repository: ""        # e.g. ghcr.io/hashmatrixdata/data-foundation
  tag: ""               # 部署期固定具体 tag，避免 latest
  pullPolicy: IfNotPresent

# 副本与资源（占位，落地时按 SLO 调整）。
replicaCount: 1
