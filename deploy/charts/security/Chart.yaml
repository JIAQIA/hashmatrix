apiVersion: v2
name: security
description: |
  数据安全分系统子 chart（M1 真实部署）。由 umbrella chart `platform` 按 `security.enabled` 聚合。
  D5：子仓 services/security 交付 image，主仓 owns chart。M1 提供 Deployment + Service（应用 8083 /
  管理 9083），datasource 指向 infra-dev 的 in-cluster PG（独立 db `security`，Flowable 启动期自建 ACT_*）；
  probe `/api/security/probe`（RBAC + 行级兜底）+ 数据权限最小骨架（#6）；完整 SC-6 属 post-M1。
type: application

version: 0.1.0
appVersion: "0.1.0"

keywords:
  - hashmatrix
  - security
  - Java

home: https://github.com/HashMatrixData/hashmatrix-security
sources:
