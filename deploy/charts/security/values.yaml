# security 子 chart values —— M1 真实部署（数据安全分系统）。
# 🔴 红线：仅 dev 占位凭据 / 脱敏 demo（acme / tenant-demo / example.com）；严禁任何真实甲方参数。
# D5：子仓交付 image，主仓 owns chart；镜像部署级注入、tag 固定（勿 latest）。
# umbrella 经 `security.enabled` 渲染（默认关，仅 values-localdev 开）。

# umbrella 注入的全局项（standalone 渲染时为空 dict）；imageRegistry 供信创 xc 切私有/国产化镜像仓。
global:
  imageRegistry: ""

# umbrella 条件开关（对应 platform/Chart.yaml dependencies 的 condition: security.enabled）。
enabled: false

image:
  repository: ghcr.io/hashmatrixdata/security
  tag: "0.1.0"                # 固定 tag（CI 随 main 推 :0.1.0 / :sha-<gitsha> / :latest）；本地经 kind load 入节点（配 IfNotPresent）
  pullPolicy: IfNotPresent

replicas: 1
# 运行用户数字 uid：镜像 Dockerfile `USER app`（Alpine `adduser -S app` → uid=100）是命名用户，
# 而 runAsNonRoot 校验需数字 uid 才能判定非 root（命名用户 → CreateContainerConfigError）。
# 故 chart 显式 runAsUser 钉死该 uid。⚠️ 耦合镜像 Alpine 分配值；镜像若改基础镜像/用户须同步。
# 长期更优解：子仓镜像改用数字 USER（对齐 governance/control-plane 的 USER 10001），届时此值可移除。
runAsUser: 100
# 资源限额（dev 保守默认；prod 经 values-<env> 上调）。**memory limit 是 OOM 护栏**——
# 无 limit 时 JVM 按节点总内存自估 max heap，多 JVM 叠加会撑爆 dev 机（见主仓 #32）。
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi
# JVM 堆随**容器 limit**自适配（非节点总内存）：MaxRAMPercentage 作用于 cgroup limit。
# 注入为 JAVA_TOOL_OPTIONS（Spring Boot 容器镜像识别）；置空则不注入、用镜像默认。
jvmOpts: "-XX:MaxRAMPercentage=75.0"

service:
  type: ClusterIP
  port: 8083                  # 应用 HTTP（端口基线）；gateway upstream host=security:8083 依赖此名/口
managementPort: 9083          # actuator（探针/指标），独立于应用端口（端口基线 §3）

# ── 数据源：指向 infra-dev 的 in-cluster PG（各服务独立 db `security`，已由 infra-dev initdb 幂等建）──
# 🔴 dev 占位凭据；生产经 ESO/secretRef 注入 PG_PASSWORD（应用侧默认即 db 名，缺失不 fail-fast 但连不上）。
# 注意 user=hashmatrix：infra-dev PG 的单超级用户（≠ 应用默认 PG_USER=security）。
# Flowable 审批引擎复用本 datasource，启动期在 `security` 库自建 ACT_* 表（database-schema-update=true）。
datasource:
  host: postgres
  port: 5432
  db: security
  user: hashmatrix
  password: hashmatrix
