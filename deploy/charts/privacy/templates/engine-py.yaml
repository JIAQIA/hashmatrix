apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-engine-py
  labels:
    {{- include "privacy.labels" . | nindent 4 }}
    app.kubernetes.io/component: engine-py
spec:
  replicas: {{ .Values.enginePy.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: engine-py
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: engine-py
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: engine-py
          image: {{ include "privacy.enginePy.image" . | quote }}
          imagePullPolicy: {{ .Values.enginePy.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.enginePy.containerPort }}
          env:
            {{- range $k, $v := .Values.enginePy.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.enginePy.containerPort }}
          resources:
            {{- toYaml .Values.enginePy.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-engine-py
  labels:
    {{- include "privacy.labels" . | nindent 4 }}
    app.kubernetes.io/component: engine-py
spec:
  selector:
    app.kubernetes.io/component: engine-py
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: {{ .Values.enginePy.containerPort }}
      targetPort: {{ .Values.enginePy.containerPort }}
