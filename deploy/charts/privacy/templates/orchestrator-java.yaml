apiVersion: apps/v1
kind: Deployment
metadata:
  # 固定 Service/工作负载名（对齐 governance 约定）：gateway upstream 静态引用本名，
  # umbrella 聚合（.Release.Name=platform）下也稳定可解析。每 ns 仅一个 privacy release。
  name: privacy-orchestrator-java
  labels:
    {{- include "privacy.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator-java
spec:
  replicas: {{ .Values.orchestratorJava.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: orchestrator-java
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: orchestrator-java
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: orchestrator-java
          image: {{ include "privacy.orchestratorJava.image" . | quote }}
          imagePullPolicy: {{ .Values.orchestratorJava.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.orchestratorJava.containerPort }}
            - name: management
              containerPort: {{ .Values.orchestratorJava.managementPort }}
          env:
            # 应用 / 管理端口显式注入（与 values 一致，避免镜像内默认漂移）
            - name: SERVER_PORT
              value: {{ .Values.orchestratorJava.containerPort | quote }}
            - name: MANAGEMENT_SERVER_PORT
              value: {{ .Values.orchestratorJava.managementPort | quote }}
            # 编排层经 service 名访问计算引擎
            - name: ENGINE_BASE_URL
              value: "http://privacy-engine-py:{{ .Values.enginePy.containerPort }}"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              # actuator 在独立管理端口（9086），非应用端口
              port: {{ .Values.orchestratorJava.managementPort }}
          resources:
            {{- toYaml .Values.orchestratorJava.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  # 固定 Service/工作负载名（对齐 governance 约定）：gateway upstream 静态引用本名，
  # umbrella 聚合（.Release.Name=platform）下也稳定可解析。每 ns 仅一个 privacy release。
  name: privacy-orchestrator-java
  labels:
    {{- include "privacy.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator-java
spec:
  selector:
    app.kubernetes.io/component: orchestrator-java
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: {{ .Values.orchestratorJava.containerPort }}
      targetPort: {{ .Values.orchestratorJava.containerPort }}
