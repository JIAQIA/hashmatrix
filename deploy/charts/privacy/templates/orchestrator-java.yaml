apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-orchestrator-java
  labels:
    {{- include "privacy.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator-java
spec:
  replicas: {{ .Values.orchestratorJava.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: orchestrator-java
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: orchestrator-java
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: orchestrator-java
          image: {{ include "privacy.orchestratorJava.image" . | quote }}
          imagePullPolicy: {{ .Values.orchestratorJava.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.orchestratorJava.containerPort }}
          env:
            # 编排层经 service 名访问计算引擎
            - name: ENGINE_BASE_URL
              value: "http://{{ .Release.Name }}-engine-py:{{ .Values.enginePy.containerPort }}"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ .Values.orchestratorJava.containerPort }}
          resources:
            {{- toYaml .Values.orchestratorJava.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-orchestrator-java
  labels:
    {{- include "privacy.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator-java
spec:
  selector:
    app.kubernetes.io/component: orchestrator-java
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: {{ .Values.orchestratorJava.containerPort }}
      targetPort: {{ .Values.orchestratorJava.containerPort }}
