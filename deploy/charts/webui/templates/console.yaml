{{- if .Values.console.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  # 固定名 `webui-console`（非 release 前缀）：gateway upstream host=webui-console:80 依赖此名
  # （单 ns 内 well-known fixture）。console 与 admin 独立工作负载，互不可达。
  name: webui-console
  labels:
    {{- include "webui.labels" . | nindent 4 }}
    app.kubernetes.io/component: webui-console
spec:
  replicas: {{ .Values.console.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: webui-console
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "webui.labels" . | nindent 8 }}
        app.kubernetes.io/component: webui-console
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: webui-console
          image: {{ include "webui.console.image" . | quote }}
          imagePullPolicy: {{ .Values.console.image.pullPolicy }}
          # ⚠️ 官方 nginx:1.27-alpine master 以 root 起、绑特权口 80 → 不设 runAsNonRoot。
          # drop ALL 后仅加回 NET_BIND_SERVICE（绑 80 所需，restricted PSA 允许的唯一例外）。
          # 生产硬化（nginx-unprivileged + :8080 + runAsNonRoot）列 post-M1（见 README）。
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              # 官方 nginx 以 root 起：启动期 chown 缓存目录(CHOWN)、worker 降权到 nginx 用户(SETUID/SETGID)、绑 :80(NET_BIND_SERVICE)。
              # 缺 CHOWN/SETUID/SETGID 会 `nginx: [emerg] chown(...) Operation not permitted` 崩溃。生产硬化 nginx-unprivileged+:8080 列 post-M1。
              add: ["CHOWN", "SETUID", "SETGID", "NET_BIND_SERVICE"]
          env:
            # ── 驱动 entrypoint envsubst 渲染运行期 config.js（D3 部署级白标）──
            - name: BRAND_APP_NAME
              value: {{ .Values.branding.appName | quote }}
            - name: BRAND_COMPANY_NAME
              value: {{ .Values.branding.companyName | quote }}
            - name: BRAND_COLOR_PRIMARY
              value: {{ .Values.branding.colorPrimary | quote }}
            - name: BRAND_COLOR_SECONDARY
              value: {{ .Values.branding.colorSecondary | quote }}
            - name: API_BASE_URL
              value: {{ .Values.console.config.apiBaseUrl | quote }}
            - name: OIDC_AUTHORITY
              value: {{ .Values.console.config.oidcAuthority | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.console.config.oidcClientId | quote }}
            - name: OIDC_SCOPE
              value: {{ .Values.console.config.oidcScope | quote }}
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            # 静态 SPA 无 actuator：探运行期渲染产物 /config.js（entrypoint 渲染后恒在，200）。
            httpGet:
              path: /config.js
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            {{- toYaml .Values.console.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: webui-console
  labels:
    {{- include "webui.labels" . | nindent 4 }}
    app.kubernetes.io/component: webui-console
spec:
  type: {{ .Values.console.service.type }}
  selector:
    app.kubernetes.io/component: webui-console
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.console.service.port }}
      targetPort: http
{{- end }}
