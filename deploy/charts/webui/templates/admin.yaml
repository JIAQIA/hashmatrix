{{- if .Values.admin.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  # 固定名 `webui-admin`（非 release 前缀）：gateway upstream host=webui-admin:80 依赖此名
  # （单 ns 内 well-known fixture）。admin 与 console 独立工作负载/独立域名，互不可达（爆炸半径隔离）。
  name: webui-admin
  labels:
    {{- include "webui.labels" . | nindent 4 }}
    app.kubernetes.io/component: webui-admin
spec:
  replicas: {{ .Values.admin.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: webui-admin
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "webui.labels" . | nindent 8 }}
        app.kubernetes.io/component: webui-admin
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: webui-admin
          image: {{ include "webui.admin.image" . | quote }}
          imagePullPolicy: {{ .Values.admin.image.pullPolicy }}
          # ⚠️ nginx root + :80 → 不设 runAsNonRoot；drop ALL 后加回 NET_BIND_SERVICE（绑 80）。
          # 生产硬化（nginx-unprivileged + :8080）列 post-M1（见 README）。
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          env:
            # ── 驱动 entrypoint envsubst 渲染运行期 config.js（D3 部署级白标）──
            - name: BRAND_APP_NAME
              value: {{ .Values.branding.appName | quote }}
            - name: BRAND_COMPANY_NAME
              value: {{ .Values.branding.companyName | quote }}
            - name: BRAND_COLOR_PRIMARY
              value: {{ .Values.branding.colorPrimary | quote }}
            - name: BRAND_COLOR_SECONDARY
              value: {{ .Values.branding.colorSecondary | quote }}
            - name: API_BASE_URL
              value: {{ .Values.admin.config.apiBaseUrl | quote }}
            - name: OIDC_AUTHORITY
              value: {{ .Values.admin.config.oidcAuthority | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.admin.config.oidcClientId | quote }}
            - name: OIDC_SCOPE
              value: {{ .Values.admin.config.oidcScope | quote }}
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /config.js
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            {{- toYaml .Values.admin.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: webui-admin
  labels:
    {{- include "webui.labels" . | nindent 4 }}
    app.kubernetes.io/component: webui-admin
spec:
  type: {{ .Values.admin.service.type }}
  selector:
    app.kubernetes.io/component: webui-admin
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.admin.service.port }}
      targetPort: http
{{- end }}
