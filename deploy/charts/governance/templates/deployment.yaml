apiVersion: apps/v1
kind: Deployment
metadata:
  name: governance
  labels:
    {{- include "governance.labels" . | nindent 4 }}
    app.kubernetes.io/component: governance
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: governance
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "governance.labels" . | nindent 8 }}
        app.kubernetes.io/component: governance
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      # 镜像 Dockerfile 已 USER 10001（非 root 数字 uid，见子仓 #18）；此处显式声明 + seccomp，
      # 不带 runAsUser（由镜像 USER 决定）即满足 restricted PSA 的 runAsNonRoot 校验。
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: governance
          image: {{ include "governance.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: SERVER_PORT
              value: {{ .Values.service.port | quote }}
            - name: MANAGEMENT_SERVER_PORT
              value: {{ .Values.managementPort | quote }}
            # ── 数据源（infra-dev in-cluster PG）。PG_PASSWORD 应用侧无默认 → 必须注入 ──
            - name: PG_HOST
              value: {{ .Values.datasource.host | quote }}
            - name: PG_PORT
              value: {{ .Values.datasource.port | quote }}
            - name: PG_DB
              value: {{ .Values.datasource.db | quote }}
            - name: PG_USER
              value: {{ .Values.datasource.user | quote }}
            # 🔴 dev 占位明文；生产改 secretKeyRef/ESO 注入。
            - name: PG_PASSWORD
              value: {{ .Values.datasource.password | quote }}
            {{- with .Values.elasticsearch.uris }}
            - name: ES_URIS
              value: {{ . | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
            - name: management
              containerPort: {{ .Values.managementPort }}
          readinessProbe:
            # deps-optional readiness：仅看应用 readinessState（PG/ES 缺失不拖垮）。探管理端口。
            httpGet:
              path: /actuator/health/readiness
              port: management
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
