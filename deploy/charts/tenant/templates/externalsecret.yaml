{{- /*
ESO ExternalSecret：从外部 Vault/KMS 拉取租户 secret 并物化成 K8s Secret。
红线：本清单**不含任何明文**，仅引用外部 store 路径——故 externalsecret.yaml 可安全入库。
依赖 external-secrets.io CRD（kubeconform 以 -ignore-missing-schemas 放行）。
*/ -}}
{{- if .Values.externalSecrets.enabled }}
{{- $root := . }}
{{- $ns := include "tenant.namespace" . }}
{{- range .Values.externalSecrets.items }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "tenant.id" $root }}-{{ .secretName }}
  namespace: {{ $ns }}
  labels:
    {{- include "tenant.labels" $root | nindent 4 }}
spec:
  refreshInterval: {{ $root.Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ $root.Values.externalSecrets.secretStoreRef.name }}
    kind: {{ $root.Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ .secretName }}
    creationPolicy: Owner
  data:
    {{- $remoteKey := printf "%s/%s/%s" $root.Values.externalSecrets.remotePathPrefix (include "tenant.id" $root) .remotePath }}
    {{- range .data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ $remoteKey | quote }}
        property: {{ .property }}
    {{- end }}
{{- end }}
{{- end }}
