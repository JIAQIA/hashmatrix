---
# APISIX 配置 ConfigMap：static config.yaml（vendored SoT 副本）+ 集群版 apisix.yaml（values 注入）。
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-gateway-config
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: apisix
data:
  # 静态配置（standalone / config_provider: yaml，无 etcd）。事实源：services/gateway/apisix/config.yaml
  # （vendored 同步副本，env-agnostic；同步：bash deploy/scripts/sync-gateway-config.sh）。
  config.yaml: |
{{ .Files.Get "files/config.yaml" | indent 4 }}
  # 声明式配置（集群版）：env-specific 字段（OIDC discovery / 上游）由 chart values 注入。
  # 结构镜像 SoT services/gateway/apisix/apisix.yaml（其 mock-upstream 仅本地 compose 自洽）。
  # 集群版受保护路由（共享 auth-tenant 链，priority:10）：protected-api（/api/* 兜底·租户上下文第一关）
  # + privacy-api（/api/privacy/*）+ security-api（/api/security/*）+ control-plane-api（/api/v1/*）
  # + data-foundation-api（/api/connectors/*）+ platform-common-api（/api/platform/*）；
  # 公共路由：webui-console / webui-admin（按 Host 分流静态 SPA·无鉴权）+ public-open（可达性探活）。
  # SoT 的本地演示/限流路由（如 ratelimit-demo）不入集群。**SoT 新增受保护路由时，需在此手工同步扩展。**
  # standalone 模式要求末行 #END 结束标记，勿删。
  apisix.yaml: |
    upstreams:
      - id: platform-upstream
        name: platform-upstream
        type: roundrobin
        nodes:
          "{{ .Values.upstreams.governance.host }}:{{ .Values.upstreams.governance.port }}": 1
      - id: privacy-upstream
        name: privacy-upstream
        type: roundrobin
        nodes:
          "{{ .Values.upstreams.privacy.host }}:{{ .Values.upstreams.privacy.port }}": 1
      - id: security-upstream
        name: security-upstream
        type: roundrobin
        nodes:
          "{{ .Values.upstreams.security.host }}:{{ .Values.upstreams.security.port }}": 1
      - id: control-plane-upstream
        name: control-plane-upstream
        type: roundrobin
        nodes:
          "{{ (index .Values.upstreams "control-plane").host }}:{{ (index .Values.upstreams "control-plane").port }}": 1
      - id: data-foundation-upstream
        name: data-foundation-upstream
        type: roundrobin
        nodes:
          "{{ (index .Values.upstreams "data-foundation").host }}:{{ (index .Values.upstreams "data-foundation").port }}": 1
      - id: platform-common-upstream
        name: platform-common-upstream
        type: roundrobin
        nodes:
          "{{ (index .Values.upstreams "platform-common").host }}:{{ (index .Values.upstreams "platform-common").port }}": 1
      - id: webui-console-upstream
        name: webui-console-upstream
        type: roundrobin
        nodes:
          "{{ (index .Values.upstreams "webui-console").host }}:{{ (index .Values.upstreams "webui-console").port }}": 1
      - id: webui-admin-upstream
        name: webui-admin-upstream
        type: roundrobin
        nodes:
          "{{ (index .Values.upstreams "webui-admin").host }}:{{ (index .Values.upstreams "webui-admin").port }}": 1
    # 共享插件链：OIDC 校验 + 租户上下文注入 + 审计（受保护路由统一引用，DRY）。
    # 🔒 openid-connect 与 tenant-context 必须成对：前者验签注入 X-Userinfo，后者据此注入 X-Tenant-*。
    plugin_configs:
      - id: auth-tenant
        desc: "OIDC 校验 -> 注入 X-Tenant-* -> 审计（受保护路由共享）"
        plugins:
          openid-connect:
            client_id: {{ .Values.oidc.clientId | quote }}
            # 公开客户端 + JWKS 本地验签，bearer_only 不使用该密钥；仅 schema 占位，非敏感信息。
            client_secret: {{ .Values.oidc.clientSecret | quote }}
            discovery: {{ .Values.oidc.discovery | quote }}
            bearer_only: true
            use_jwks: true
            scope: openid
            set_userinfo_header: true
          tenant-context:
            userinfo_header: X-Userinfo
            tenant_claim: organization
            active_tenant_claim: active_organization
            fallback_claim: tenant
            require_tenant: true
          # identity-context：据同一 X-Userinfo 注入 X-User(sub)/X-Roles(realm roles)，供应用方法级 RBAC。
          identity-context:
            userinfo_header: X-Userinfo
            roles_claim: roles
            require_identity: true
          audit-log: {}
    routes:
      # 受保护路由（governance 兜底）：共享 auth-tenant 链 + 按租户限流。无 token -> 401；合法 token -> 上游可见 X-Tenant-*。
      # governance 后端服务**全路径** /api/meta/*（@RequestMapping("/api/meta")，无 context-path），与 security/control-plane
      # 同款约定 → **不剥 /api 前缀**（无 proxy-rewrite）。早期指向 go-httpbin mock-upstream 时曾 strip 到 /$1，
      # 真实 governance 落地后该 strip 会令上游收到 /meta/search → 500（M1·I4 实测），故移除。后端改路径时同步本 uri。
      - id: protected-api
        name: protected-api
        desc: "受保护 API——租户上下文进入系统的第一道关"
        uri: /api/*
        upstream_id: platform-upstream
        plugin_config_id: auth-tenant
        plugins:
          limit-count:
            count: {{ .Values.rateLimit.count }}
            time_window: {{ .Values.rateLimit.timeWindow }}
            key_type: var
            key: tenant_id            # 注入后的可信租户变量（非 http_x_tenant_id）
            rejected_code: 429
            policy: local
            allow_degradation: true
      # privacy 受保护路由：复用 auth-tenant 链注入 X-Tenant-*，路由到隐私计算编排层。
      # priority 高于 protected-api（/api/*）以确保 /api/privacy/* 不被通配兜底抢走；
      # rewrite 保留 /api 前缀（编排层端点为 /api/v1/psi/*）。
      # 依赖：编排层对外端点 /api/v1/psi/intersect（客户端经 /api/privacy/v1/psi/intersect 访问）；
      # 契约见主仓 contracts/openapi/privacy-orchestrator-v1.yaml，改路径时需同步本 rewrite。
      - id: privacy-api
        name: privacy-api
        desc: "隐私计算编排层（PSI/匿踪）受保护路由"
        uri: /api/privacy/*
        priority: 10
        upstream_id: privacy-upstream
        plugin_config_id: auth-tenant
        plugins:
          proxy-rewrite:
            regex_uri: ["^/api/privacy/(.*)", "/api/$1"]
          limit-count:
            count: {{ .Values.rateLimit.count }}
            time_window: {{ .Values.rateLimit.timeWindow }}
            key_type: var
            key: tenant_id
            rejected_code: 429
            policy: local
            allow_degradation: true
      # security 受保护路由：复用 auth-tenant 链注入 X-Tenant-*，路由到数据安全分系统。
      # priority 高于 protected-api（/api/*）以确保 /api/security/* 不被通配兜底抢走（同 privacy-api）；
      # security 后端 ProbeController 服务**全路径** /api/security/probe（@RequestMapping("/api/security")，
      # 无 context-path），故不剥 /api 前缀（无 proxy-rewrite）；后端改路径时需同步本 uri。
      # auth-tenant 链经 identity-context 注入 X-User/X-Roles（#11）；security probe 守
      #    @PreAuthorize("hasRole('security-viewer')")（据 X-Roles）。持 security-viewer 角色的 token → 200；
      #    无该角色 → 403；匿名 → 401。（端到端 200 还需 security 服务真实部署，见 #38。）
      - id: security-api
        name: security-api
        desc: "数据安全分系统受保护路由（probe / 分类分级 / 审计）"
        uri: /api/security/*
        priority: 10
        upstream_id: security-upstream
        plugin_config_id: auth-tenant
        plugins:
          limit-count:
            count: {{ .Values.rateLimit.count }}
            time_window: {{ .Values.rateLimit.timeWindow }}
            key_type: var
            key: tenant_id
            rejected_code: 429
            policy: local
            allow_degradation: true
      # control-plane 受保护路由：复用 auth-tenant 链，路由到多租户控制平面。
      # priority 高于 protected-api（/api/*）防被通配兜底抢走；后端服务全路径 /api/v1/...
      # （网关 strip 部署级 /api，对外 /v1/...；@RequestMapping("/api/v1/...")，无 context-path）→ 不剥前缀。
      #
      # ⚖️ control-plane = **共享控制平面**（跨租户管理，非租户数据面）→ 路由级覆盖 tenant-context 为
      #    require_tenant=false：平台管理员（superadmin，无单一租户上下文）调用跨租户高权端点
      #    （/{id}/approval、/suspend…）不应被 tenant-context fail-closed 403（M1·I4 实测：原 require_tenant=true
      #    下 superadmin 被 403）；同时修复多 membership 用户无 active_organization 时连 /v1/me/tenants 都进不去的
      #    鸡生蛋问题。openid-connect 仍验签（401）、identity-context 仍注入 X-User/X-Roles；有租户的调用方仍被注入
      #    X-Tenant-*。鉴权下沉到 control-plane 方法级 @PreAuthorize(hasRole('SUPERADMIN'))（据 X-Roles）。
      #    （不为图省事给 superadmin 塞假租户——那会破坏 admin 平面「无租户上下文」不变量，见 gateway#13。）
      - id: control-plane-api
        name: control-plane-api
        desc: "多租户控制平面受保护路由（租户注册/审批/开通/配额 + /v1/me/tenants）"
        uri: /api/v1/*
        priority: 10
        upstream_id: control-plane-upstream
        plugin_config_id: auth-tenant
        plugins:
          # 路由级覆盖 auth-tenant 的 tenant-context（APISIX 路由级整体覆盖 plugin_config 同名插件）：
          # 仅改 require_tenant=false，其余字段须与 auth-tenant 一致（否则注入行为漂移）。
          tenant-context:
            userinfo_header: X-Userinfo
            tenant_claim: organization
            active_tenant_claim: active_organization
            fallback_claim: tenant
            require_tenant: false
          limit-count:
            count: {{ .Values.rateLimit.count }}
            time_window: {{ .Values.rateLimit.timeWindow }}
            key_type: var
            key: tenant_id
            rejected_code: 429
            policy: local
            allow_degradation: true
      # 组织成员自管理（租户自管理面 · #57 契约 /v1/org/members）：成员邀请/移除经 control-plane 编排 Keycloak Org membership。
      # ⚠️ priority 11 > control-plane-api(10)：确保 /api/v1/org/members* **不被** /api/v1/* 跨租户管理路由抢走——
      #    后者 require_tenant=false（superadmin 跨租户面），而成员面是**租户自管理** → 必须 require_tenant=true。
      # ✅ 不覆盖 tenant-context → 继承 auth-tenant 默认 require_tenant=true（无租户身份 fail-closed 403，与数据面一致）。
      # 后端全路径 /api/v1/org/members（control-plane @RequestMapping("/api/v1/..."），无 strip）；用 uris 数组覆盖 bare + 子路径。
      # 🛡 R3：成员 SoT 在 Keycloak Org，control-plane 仅经 KC Admin API 编排，不另建成员凭据实体。
      - id: control-plane-members-api
        name: control-plane-members-api
        desc: "组织成员自管理（租户自管理 · require_tenant=true，区别于 /api/v1/* 跨租户管理面）"
        uris: ["/api/v1/org/members", "/api/v1/org/members/*"]
        priority: 11
        upstream_id: control-plane-upstream
        plugin_config_id: auth-tenant
        plugins:
          limit-count:
            count: {{ .Values.rateLimit.count }}
            time_window: {{ .Values.rateLimit.timeWindow }}
            key_type: var
            key: tenant_id
            rejected_code: 429
            policy: local
            allow_degradation: true
      # data-foundation 受保护路由：复用 auth-tenant 链，路由到数据底座。
      # 后端 ConnectorController 服务全路径 /api/connectors/...（无 context-path）→ 不剥前缀。
      # 同时匹配 bare `/api/connectors`（= ConnectorController.list() 端点）与子路径 `/api/connectors/*`
      # （如 /tenant-catalog）：`/api/connectors/*` 不匹配无尾斜杠的 bare 路径 → 会落 /api/* 兜底打到
      # governance 返 500（M1·I4 实测）。用 uris 数组覆盖两者。
      - id: data-foundation-api
        name: data-foundation-api
        desc: "数据底座受保护路由（连接器目录）"
        uris: ["/api/connectors", "/api/connectors/*"]
        priority: 10
        upstream_id: data-foundation-upstream
        plugin_config_id: auth-tenant
        plugins:
          limit-count:
            count: {{ .Values.rateLimit.count }}
            time_window: {{ .Values.rateLimit.timeWindow }}
            key_type: var
            key: tenant_id
            rejected_code: 429
            policy: local
            allow_degradation: true
      # platform-common 受保护路由：复用 auth-tenant 链，路由到平台公共服务。
      # 后端 PlatformInfoController 服务全路径 /api/platform/...（无 context-path）→ 不剥前缀。
      - id: platform-common-api
        name: platform-common-api
        desc: "平台公共服务受保护路由（调度/元数据/审计）"
        uri: /api/platform/*
        priority: 10
        upstream_id: platform-common-upstream
        plugin_config_id: auth-tenant
        plugins:
          limit-count:
            count: {{ .Values.rateLimit.count }}
            time_window: {{ .Values.rateLimit.timeWindow }}
            key_type: var
            key: tenant_id
            rejected_code: 429
            policy: local
            allow_degradation: true
      # webui 公共路由（无鉴权·静态 SPA）：按 Host 分流 console / admin（同源隔离，爆炸半径）。
      # priority:0（默认）< /api/* 受保护路由 → 两面的后端 API 调用仍各走对应后端路由；
      # 本路由仅承接 SPA shell / assets / config.js。SPA 路由回退由镜像内 nginx try_files 处理。
      - id: webui-console
        name: webui-console
        desc: "租户控制台静态 SPA（按 Host 分流，无鉴权）"
        uri: /*
        hosts:
          - {{ .Values.webui.hosts.console | quote }}
        upstream_id: webui-console-upstream
        plugins:
          audit-log: {}
      - id: webui-admin
        name: webui-admin
        desc: "平台管理台静态 SPA（按 Host 分流·独立域名，无鉴权）"
        uri: /*
        hosts:
          - {{ .Values.webui.hosts.admin | quote }}
        upstream_id: webui-admin-upstream
        plugins:
          audit-log: {}
      # 公共路由：无鉴权，用于网关可达性探活（9080 经 Service 可达验证）。
      - id: public-open
        name: public-open
        desc: "公共开放端点（无鉴权）"
        uri: /public/*
        upstream_id: platform-upstream
        plugins:
          proxy-rewrite:
            regex_uri: ["^/public/(.*)", "/$1"]
          audit-log: {}
    #END
---
# 自定义 Lua 插件 ConfigMap（tenant-context / audit-log）。事实源：services/gateway/plugins/*.lua
# （vendored 同步副本；同步：bash deploy/scripts/sync-gateway-config.sh）。
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-gateway-plugins
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: apisix
data:
{{- range $path, $_ := .Files.Glob "files/plugins/*.lua" }}
  {{ base $path }}: |
{{ $.Files.Get $path | indent 4 }}
{{- end }}
