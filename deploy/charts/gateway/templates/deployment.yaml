apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-gateway
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: apisix
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: apisix
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "gateway.labels" . | nindent 8 }}
        app.kubernetes.io/component: apisix
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        # config/插件变更滚动重启（subPath 挂载不随 ConfigMap 热更新）。
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: apisix
          image: {{ include "gateway.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: proxy
              containerPort: {{ .Values.service.port }}
            - name: control
              containerPort: {{ .Values.controlPort }}
          readinessProbe:
            tcpSocket:
              port: proxy
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: proxy
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            # standalone 配置（subPath 单文件挂载，避免遮蔽 conf/ 内其它文件）。
            - name: config
              mountPath: /usr/local/apisix/conf/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: config
              mountPath: /usr/local/apisix/conf/apisix.yaml
              subPath: apisix.yaml
              readOnly: true
            # 自定义 Lua 插件（subPath 单文件挂载到 plugins/，不遮蔽内置插件目录）。
            - name: plugins
              mountPath: /usr/local/apisix/apisix/plugins/tenant-context.lua
              subPath: tenant-context.lua
              readOnly: true
            - name: plugins
              mountPath: /usr/local/apisix/apisix/plugins/audit-log.lua
              subPath: audit-log.lua
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-gateway-config
        - name: plugins
          configMap:
            name: {{ .Release.Name }}-gateway-plugins
