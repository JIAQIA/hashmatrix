apiVersion: v2
name: gateway
description: |
  南北向网关子 chart：把 APISIX（standalone 声明式 / config_provider: yaml，无 etcd）+ 本平台
  自定义网关配置/插件（tenant-context / audit-log）部署到 K8s 单 ns。
  配置/插件事实源在 submodule services/gateway；env-specific 字段（OIDC discovery / 上游）由
  chart values → ConfigMap 渲染注入。由 umbrella chart platform 按 gateway.enabled 聚合。
type: application

version: 0.1.0
appVersion: "3.11.0"        # APISIX 版本（镜像 tag 默认 3.11.0-debian，见 values.image）

# ── APISIX 官方 chart 依赖（升级路径，M1 暂不启用）──
# 决策（主仓拍板 · #17）：M1 采用「自托管最小 APISIX Deployment」而非官方 chart 硬依赖，原因——
#   主仓渲染门 deploy/scripts/validate.sh **离线**（helm dependency build 不拉外部 chart，
#   见 platform/Chart.yaml 对有状态依赖的同款「钉版本但注释」做法）。官方 chart 作硬依赖会破坏该离线门。
#   自托管 1:1 镜像 services/gateway/docker-compose.local.yml 的 proven standalone 配置；
#   骨架（ConfigMap 注入契约 / 端口 9080 / 插件挂载约定）与官方 chart 等价、后续可无损切换，不返工。
# 升级路径：取消下方注释 → helm dependency update → values 置 apisix.enabled=true 并把 config 迁移到官方 chart 透传。
# dependencies:
#   - name: apisix
#     version: "2.x.x"                 # 启用前核对当时官方稳定版（standalone 支持 etcd.enabled=false）
#     repository: "https://charts.apiseven.com"
#     condition: apisix.enabled

keywords:
  - gateway
  - apisix
  - oidc
  - multi-tenant

home: https://github.com/HashMatrixData/hashmatrix-gateway
sources:
  - https://github.com/HashMatrixData/hashmatrix-gateway
