# infra-dev 子 chart values —— 本地/dev 端到端验证的 in-cluster 依赖（非生产）。
# 🔴 红线：仅本地 dev 占位凭据 / 脱敏 demo 数据；严禁用于任何真实环境，严禁出现真实甲方参数。
# 由 umbrella platform 按 infra-dev.enabled 聚合；默认仅 values-localdev 置 infra-dev.enabled=true。

# umbrella 注入的全局项（standalone 渲染时为空 dict）；imageRegistry 供信创 xc 切私有/国产化镜像仓。
global:
  imageRegistry: ""

# ── in-cluster Keycloak（OIDC 身份源；realm 预置自 services/gateway/keycloak/realm-export.json）──
# 固定 Service 名 `keycloak`（非 release 前缀，见 templates/keycloak-service.yaml）：与 gateway
# values.oidc.discovery 的 well-known 主机名对齐，且令「集群内取 token 的 issuer == 网关 discovery
# 解析出的 issuer」（避免 issuer 不一致导致 B 档验签全 401，见 README「issuer 一致性」）。
keycloak:
  enabled: true
  image:
    repository: quay.io/keycloak/keycloak
    tag: "26.0"               # 与 services/gateway/docker-compose.local.yml 对齐（proven）
    pullPolicy: IfNotPresent
  # 仅本地 dev 引导凭据占位——严禁用于真实环境（红线）。
  bootstrapAdmin:
    username: admin
    password: admin
  realm: hashmatrix           # 须与 realm-export.json 的 realm 名一致（gateway discovery 路径同名）
  service:
    port: 8080               # 集群内应用端口（基线 8180 仅宿主/dev 暴露，勿写进集群侧 discovery）
  # 资源限额（dev 保守默认）。Keycloak 是 JVM 且 realm import 较重 → limit 给足。**OOM 护栏**（#32）。
  resources:
    requests:
      cpu: 250m
      memory: 384Mi
    limits:
      memory: 768Mi
  # Keycloak JVM 堆随容器 limit 自适配；JAVA_OPTS_APPEND 是 Keycloak 官方扩展点。置空则不注入。
  jvmOpts: "-XX:MaxRAMPercentage=70.0"

# ── 回显 upstream（go-httpbin）——临时替尚未就绪的 governance（决策 D-F）──
# governance 镜像未就绪期间，网关受保护路由上游暂指此回显端点（/headers 回显收到的请求头），
# 使「网关注入 X-Tenant-* → 上游收到」闭环可被 gateway scripts/cluster_e2e.py B 档断言。
# governance(I5) 就绪后：echoStub.enabled=false 且把 values 的 gateway.upstreams.governance 改回 governance:8082。
echoStub:
  enabled: true
  image:
    repository: mccutchen/go-httpbin
    tag: "v2.15.0"           # 与 gateway compose 的 mock-upstream 同镜像（回显请求头）
    pullPolicy: IfNotPresent
  service:
    port: 8080               # go-httpbin 默认监听 8080
  # 资源限额（dev 保守默认）。go-httpbin 极轻量。
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      memory: 64Mi

# ── in-cluster PostgreSQL（dev 级有状态库；单实例 + 各服务独立 db，呼应端口基线「5432 单实例+独立 db」）──
# 决策 D-E 的增量落地（#15 · I1）：自托管最小 manifest，非社区 chart，守离线渲染门。
# 数据用 emptyDir（**无持久卷**，与本 chart Keycloak 一致）：Pod 重建即重跑 initdb 重建各 db——dev e2e 足够。
# 各服务 datasource 由其子 chart（I5）指向固定 Service `postgres:5432`，库名见 databases。
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16.4"               # 钉 minor，dev 可复现；走 DaoCloud docker.io 镜像（见 tools/local-infra）
    pullPolicy: IfNotPresent
  # 仅本地 dev 占位凭据（单超级用户拥有全部 db）——严禁用于真实环境（红线）。
  auth:
    username: hashmatrix
    password: hashmatrix
    bootstrapDb: hashmatrix   # postgres 镜像要求一个初始 db；各服务库由 initdb 脚本另建
  # 各服务独立 db（initdb 幂等创建）。新增后端时在此追加；JDBC: postgres:5432/<db>。
  # 名取无分隔小写以免 SQL 加引号（control-plane→controlplane / data-foundation→datafoundation）。
  databases:
    - governance
    - controlplane
    - security
    - datafoundation
    - privacy
  service:
    port: 5432
  # 资源限额（dev 保守默认）。Postgres 非 JVM。
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi
